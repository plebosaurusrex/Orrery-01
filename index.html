<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Su'Hur System — Echo, Drift</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c12; --accent:#f4a03a;
  --popup-bg:rgba(10,12,22,0.97);
  --popup-border:rgba(200,180,140,0.25);
  --fd:'Cinzel',serif; --fb:'Crimson Pro',Georgia,serif;
  --dim:rgba(200,180,140,0.55);
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:var(--fb);color:#e0d8cc;cursor:grab;user-select:none}
body.panning{cursor:grabbing}
#cc{width:100%;height:100%;position:relative;overflow:hidden}
canvas#cv{display:block;width:100%;height:100%}

/* ── HUD — every element its own fixed div ── */
#hud-title{position:fixed;top:24px;left:24px;pointer-events:none;z-index:50}
#hud-title h1{font-family:var(--fd);font-size:18px;font-weight:700;letter-spacing:.08em;color:rgba(240,220,180,.85);line-height:1.2}
#hud-title p{font-family:var(--fb);font-style:italic;font-size:12px;color:rgba(200,180,140,.45);margin-top:2px;letter-spacing:.04em}

#hud-scale{position:fixed;bottom:24px;left:24px;pointer-events:none;z-index:50}
#hud-scale-label{font-family:var(--fd);font-size:10px;letter-spacing:.06em;color:var(--dim);text-align:center;margin-bottom:5px}
#hud-scale-bar{width:100px;height:2px;background:rgba(200,180,140,.35);position:relative}
#hud-scale-bar::before,#hud-scale-bar::after{content:'';position:absolute;width:2px;height:7px;background:rgba(200,180,140,.35);top:-2px}
#hud-scale-bar::before{left:0}#hud-scale-bar::after{right:0}

/* ── Legend (collapsible) ── */
#hud-legend{position:fixed;top:24px;right:24px;z-index:50;background:rgba(10,12,22,.86);border:1px solid rgba(200,180,140,.12);border-radius:6px;overflow:hidden;min-width:170px}
#leg-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;font-family:var(--fd);font-size:10px;letter-spacing:.1em;color:rgba(200,180,140,.6);text-transform:uppercase;pointer-events:auto}
#leg-toggle:hover{color:rgba(200,180,140,.9)}
#leg-arrow{font-size:10px;transition:transform .2s;display:inline-block}
#leg-body{max-height:0;overflow:hidden;transition:max-height .25s ease;padding:0 14px}
#hud-legend.open #leg-body{max-height:220px;padding-bottom:12px}
#hud-legend.open #leg-arrow{transform:rotate(180deg)}
.li{display:flex;align-items:center;gap:9px;margin-bottom:7px;font-size:12px;color:rgba(200,180,140,.75);font-family:var(--fb)}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lr{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid;background:transparent}
.lw{width:14px;height:8px;flex-shrink:0;background:linear-gradient(90deg,rgba(255,160,40,.85),rgba(255,200,80,.15));border-radius:2px}

/* ── Timeline ── */
#hud-tl{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(10,12,22,.9);border:1px solid rgba(200,180,140,.14);border-radius:8px;padding:10px 16px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:340px;pointer-events:auto}

#tl-year{font-family:var(--fd);font-size:13px;letter-spacing:.1em;color:rgba(240,220,180,.85);text-align:center;min-height:20px}
#tl-year span{color:var(--accent)}
#tl-year em{font-style:normal;font-size:10px;letter-spacing:.12em;color:rgba(200,180,140,.45);margin-left:6px}

/* calendar mode toggle */
#cal-toggle{display:flex;gap:4px}
.cal-btn{font-family:var(--fd);font-size:9px;letter-spacing:.1em;color:rgba(200,180,140,.45);background:none;border:1px solid rgba(200,180,140,.15);border-radius:3px;padding:2px 8px;cursor:pointer;transition:all .12s;text-transform:uppercase}
.cal-btn.active{color:var(--accent);border-color:var(--accent)}
.cal-btn:hover:not(.active){color:rgba(200,180,140,.8);border-color:rgba(200,180,140,.4)}

#tl-scrubber{width:100%;cursor:pointer;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:rgba(200,180,140,.18);outline:none}
#tl-scrubber::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px rgba(244,160,58,.4)}
#tl-scrubber::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}

#epoch-btns{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:1px}
.ep-btn{font-family:var(--fd);font-size:8px;letter-spacing:.07em;color:rgba(200,180,140,.5);background:none;border:1px solid rgba(200,180,140,.15);border-radius:3px;padding:2px 7px;cursor:pointer;transition:all .12s}
.ep-btn:hover{color:rgba(240,220,180,.9);border-color:rgba(200,180,140,.5)}

#tl-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
.tl-btn{background:none;border:1px solid rgba(200,180,140,.2);color:rgba(200,180,140,.7);border-radius:4px;width:30px;height:26px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:var(--fd)}
.tl-btn:hover{border-color:rgba(200,180,140,.6);color:rgba(240,220,180,.9);background:rgba(200,180,140,.06)}
.tl-btn.active{border-color:var(--accent);color:var(--accent)}
#speed-select{font-family:var(--fd);font-size:9px;letter-spacing:.08em;color:rgba(200,180,140,.8);background:rgba(10,12,22,.95);border:1px solid rgba(200,180,140,.2);border-radius:4px;padding:3px 6px;cursor:pointer;height:26px;outline:none;min-width:80px}
#speed-select:focus{border-color:var(--accent)}
#speed-select option{background:#0d0f1a;color:rgba(200,180,140,.9)}
#goto-wrap{display:flex;align-items:center;gap:5px;margin-top:2px}
#goto-wrap label{font-family:var(--fd);font-size:8px;letter-spacing:.1em;color:rgba(200,180,140,.4);text-transform:uppercase;white-space:nowrap}
#goto-input{font-family:var(--fd);font-size:10px;color:rgba(240,220,180,.85);background:rgba(10,12,22,.95);border:1px solid rgba(200,180,140,.2);border-radius:4px;padding:2px 7px;width:90px;outline:none;height:24px}
#goto-input:focus{border-color:var(--accent)}
#goto-input::placeholder{color:rgba(200,180,140,.25);font-size:9px}
#goto-btn{font-family:var(--fd);font-size:8px;letter-spacing:.08em;color:rgba(200,180,140,.6);background:none;border:1px solid rgba(200,180,140,.18);border-radius:4px;padding:2px 9px;cursor:pointer;height:24px;transition:all .12s;text-transform:uppercase;white-space:nowrap}
#goto-btn:hover{color:rgba(240,220,180,.9);border-color:rgba(200,180,140,.5)}

/* ── Popup ── */
#popup{position:fixed;z-index:9999;min-width:210px;max-width:290px;background:var(--popup-bg);border:1px solid var(--popup-border);border-radius:6px;padding:16px 18px 14px;box-shadow:0 8px 40px rgba(0,0,0,.75);backdrop-filter:blur(8px);opacity:0;visibility:hidden;transform:translateY(5px);transition:opacity .16s ease,transform .16s ease,visibility 0s linear .16s;pointer-events:auto}
#popup.open{opacity:1;visibility:visible;transform:translateY(0);transition:opacity .16s ease,transform .16s ease,visibility 0s linear 0s}
#popup-close{position:absolute;top:9px;right:11px;background:none;border:none;color:rgba(200,180,140,.55);font-size:20px;line-height:1;cursor:pointer;padding:2px 5px;border-radius:3px;transition:color .15s;pointer-events:auto}
#popup-close:hover{color:#e8c47a}
#popup-name{font-family:var(--fd);font-size:15px;font-weight:600;color:#f0e0b8;letter-spacing:.04em;padding-right:22px;line-height:1.3}
#popup-type{font-family:var(--fb);font-size:12px;font-style:italic;color:rgba(200,180,140,.7);margin-top:3px}
#popup-div{border:none;border-top:1px solid rgba(200,180,140,.15);margin:10px 0 9px}
#popup-desc{font-family:var(--fb);font-size:13.5px;font-weight:300;line-height:1.55;color:#ccc4b0}
#popup-period{font-family:var(--fd);font-size:9px;letter-spacing:.1em;color:rgba(200,180,140,.4);text-transform:uppercase;margin-top:10px}
</style>
</head>
<body>
<div id="cc"><canvas id="cv"></canvas></div>

<div id="hud-title"><h1>Su&#x2019;Hur System</h1><p>Echo, Drift &middot; Interactive Orrery</p></div>

<div id="hud-scale">
  <div id="hud-scale-label">— AU —</div>
  <div id="hud-scale-bar"></div>
</div>

<div id="hud-legend">
  <div id="leg-toggle">Planet Types <span id="leg-arrow">&#x25B2;</span></div>
  <div id="leg-body">
    <div class="li"><div class="ld" style="background:#b09888"></div>Rocky &middot; Uninhabitable</div>
    <div class="li"><div class="ld" style="background:#5a9060"></div>Rocky &middot; Habitable</div>
    <div class="li"><div class="ld" style="background:#7aaac8"></div>Ice World</div>
    <div class="li"><div class="ld" style="background:#b86030"></div>Gas Giant</div>
    <div class="li"><div class="lr" style="border-color:#a09060"></div>Gas Giant &middot; Rings</div>
    <div class="li"><div class="ld" style="background:#80c0d8"></div>Habitable Moon</div>
    <div class="li"><div class="lw"></div>Cosmic Wellspring</div>
  </div>
</div>

<div id="hud-tl">
  <div id="tl-year"><span>CE 3700</span></div>
  <div id="cal-toggle">
    <button class="cal-btn active" data-mode="CE">CE</button>
    <button class="cal-btn" data-mode="PC">PC</button>
    <button class="cal-btn" data-mode="PE">PE</button>
  </div>
  <input type="range" id="tl-scrubber" min="0" max="2191500" value="50" step="365">
  <div id="epoch-btns"></div>
  <div id="tl-controls">
    <button class="tl-btn" id="btn-rew" title="Rewind to start">&#x23EE;</button>
    <button class="tl-btn active" id="btn-play">&#x25B6;</button>
    <select id="speed-select" title="Playback speed">
      <option value="0">Paused</option>
      <option value="29">0.1x &mdash; 1 yr / 10s</option>
      <option value="58">0.2x &mdash; 1 yr / 5s</option>
      <option value="145">0.5x &mdash; 1 yr / 2s</option>
      <option value="290">1x &mdash; 1 yr / s</option>
      <option value="580">2x &mdash; 2 yrs / s</option>
      <option value="1450">5x &mdash; 5 yrs / s</option>
      <option value="2900">10x &mdash; 10 yrs / s</option>
      <option value="7250">25x &mdash; 25 yrs / s</option>
      <option value="14500">50x &mdash; 50 yrs / s</option>
      <option value="29000">100x &mdash; 100 yrs / s</option>
      <option value="145000">500x &mdash; 500 yrs / s</option>
    </select>
  </div>
  <div id="goto-wrap">
    <label for="goto-input">Go to year</label>
    <input id="goto-input" type="text" placeholder="e.g. PE 4409 or CE 9600" spellcheck="false">
    <button id="goto-btn">Go</button>
  </div>
</div>

<div id="popup">
  <button id="popup-close">&#x00D7;</button>
  <div id="popup-name"></div>
  <div id="popup-type"></div>
  <hr id="popup-div">
  <div id="popup-desc"></div>
  <div id="popup-period"></div>
</div>

<script>
(function(){
'use strict';

// ── CALENDAR CONSTANTS ────────────────────────────────────────────────
const CE_COLLAPSE   = 3100;       // PC = 0
const KAEL_BORN_CE  = 6100;       // PE = 1 (Kael AkShur born, empire founded)
const START_CE      = 3700;       // sim day 0
const EARTH_YR_DAYS = 365.25;     // days in an Earth year
const ITZALCHE_DAYS = 290;        // days in one PE year (Itzalche orbit)
const PE_PER_EARTH  = EARTH_YR_DAYS / ITZALCHE_DAYS; // ~1.2595
const MAX_SIM_DAYS  = 2191500;    // 9700 CE
const KAEL_SIM_DAY  = 876600;     // 6100 CE = PE Year 1

// simDay → CE (fractional)
function sdToCE(sd){ return START_CE + sd / EARTH_YR_DAYS; }
// CE → PC (negative before 3100 CE)
function ceToPCval(ce){ return ce - CE_COLLAPSE; }
// CE → PE (negative before 6100 CE)
function ceToPEval(ce){ return (ce - KAEL_BORN_CE) * PE_PER_EARTH + 1; }

// Format year display for chosen mode
let calMode = 'CE';

function formatYear(sd){
  const ce = sdToCE(sd);
  const dayOfYear = Math.floor(((ce % 1) + 1) * EARTH_YR_DAYS) % EARTH_YR_DAYS + 1;

  if(calMode === 'CE'){
    const yr = Math.floor(ce);
    return { year: 'CE ' + yr.toLocaleString(), day: dayOfYear, era: '' };
  }
  if(calMode === 'PC'){
    const pc = ceToPCval(ce);
    const yr = Math.floor(pc);
    const sign = yr >= 0 ? '+' : '';
    const era = yr < 0 ? 'Pre-Collapse' : yr < (KAEL_BORN_CE - CE_COLLAPSE) ? 'Post-Collapse' : 'Imperial Era';
    return { year: 'PC ' + sign + yr.toLocaleString(), day: dayOfYear, era };
  }
  // PE
  const pe = ceToPEval(ce);
  const yr = Math.floor(pe);
  const sign = yr >= 0 ? '' : '';
  // day within PE year
  const peDay = Math.floor(((pe % 1) + 1) * ITZALCHE_DAYS) % ITZALCHE_DAYS + 1;
  const era = yr < 0 ? 'Pre-Enlightenment' : 'Post-Enlightenment';
  return { year: 'PE ' + yr.toLocaleString(), day: peDay, era, isPE: true };
}

function updateYearDisplay(sd){
  const f = formatYear(sd);
  const el = document.getElementById('tl-year');
  const dayUnit = f.isPE ? 'Itz. Day' : 'Day';
  el.innerHTML = '<span>' + f.year + '</span> &nbsp;&middot;&nbsp; '
    + dayUnit + ' <span>' + f.day + '</span>'
    + (f.era ? '<em>' + f.era + '</em>' : '');
}

// ── CANVAS ────────────────────────────────────────────────────────────
const canvas = document.getElementById('cv');
const ctx    = canvas.getContext('2d');
let W, H, dpr;

function resize(){
  dpr = window.devicePixelRatio || 1;
  W = canvas.offsetWidth; H = canvas.offsetHeight;
  canvas.width = W*dpr; canvas.height = H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize', resize);

// ── PLANET DATA ───────────────────────────────────────────────────────
const STAR_R = 22;
const bodies = [
  {id:'ravi',     name:'Ravi',     type:'Rocky \u00b7 Uninhabitable',              period:18,    orbitR:68,  bodyR:3.5, color:'#b09888',shineColor:'#d0b8a8',shape:'rocky',   angle:1.3963,
   desc:"Tiny, barren. Methane-dense atmosphere clings to its crater-scored surface. No value to the empire but proximity."},
  {id:'uzara',    name:'Uzara',    type:'Rocky \u00b7 Uninhabitable',              period:73,    orbitR:100, bodyR:5,   color:'#b8a060',shineColor:'#d8c080',shape:'rocky',   angle:3.4428,
   desc:"Acid oceans eat at deep canyons. A thick CO\u2082 atmosphere \u2014 a portrait of ruin before the ruins."},
  {id:'samaq',    name:'Samaq',    type:'Rocky \u00b7 Once-Inhabited',             period:196,   orbitR:138, bodyR:5.5, color:'#c09070',shineColor:'#d8a878',shape:'rocky',   angle:3.2057,
   desc:"Blackened ruins dot a desert that used to be a civilization. Exterminated in the early conquests of the Ashur\u2019xal Empire."},
  {id:'itzalche', name:'Itzalche', type:'Rocky \u00b7 Habitable \u2014 Imperial Capital', period:290, orbitR:174, bodyR:6, color:'#3a8860',shineColor:'#5aaa78',shape:'rocky', angle:1.5166,
   desc:"The jewel of the system. Seat of the Ashur\u2019xal Empire. Lush blue-green with three moons and strange super-seasons. Calendar standard of the PE era."},
  {id:'taman',    name:'Taman',    type:'Gas Giant \u00b7 Rusty-Red (~14 Earths)', period:290,   orbitR:210, bodyR:14,  color:'#b86030',shineColor:'#d07848',shape:'gas',     angle:1.5166, bandColor:'#8a4820', hasMoon:true,
   desc:"A rusty-red gas giant. One of seven moons harbors a civilization. Its mass dominates this region of the system."},
  {id:'agni',     name:'Agni',     type:'Rocky \u00b7 Habitable \u2014 Volcanic',  period:392,   orbitR:252, bodyR:5.5, color:'#6a9040',shineColor:'#8aaa58',shape:'rocky',   angle:4.7444,
   desc:"Volcanic and tropical. A shallow ocean dotted with atolls. The surface bursts with activity. Few people; much fish."},
  {id:'kivuli',   name:'Kivuli',   type:'Rocky \u00b7 Habitable \u2014 Asteroid Ring', period:414, orbitR:294, bodyR:5.5, color:'#4a7888',shineColor:'#6a98a8',shape:'rocky', angle:5.5243, hasRing:true,
   desc:"Home of the Nuru. Asteroid rings harbor precious metals that power their advanced technology. Ifu\u2019s world."},
  {id:'ashwin',   name:'Ashwin',   type:'Rocky \u00b7 Habitable \u2014 Farmworld',  period:616,   orbitR:336, bodyR:5.5, color:'#5a9060',shineColor:'#7aaa78',shape:'rocky',   angle:4.7328,
   desc:"Temperate. Vast forests, grasslands, oceans. The empire\u2019s breadbasket \u2014 threatened by a native bacterial bloom."},
  {id:'marut',    name:'Marut',    type:'Rocky \u00b7 Habitable \u2014 Ice World',  period:770,   orbitR:378, bodyR:5.5, color:'#7aaac8',shineColor:'#a0cce0',shape:'rocky',   angle:2.5296,
   desc:"Ice and blizzard. The last conquered world. Its people still hold to Baudim \u2014 their ancient faith \u2014 and find in its cold, freedom."},
  {id:'kusari',   name:'Kusari',   type:'Gas Giant \u00b7 2.5 Jupiter Masses \u00b7 27 Moons', period:1277, orbitR:430, bodyR:16, color:'#8878a0',shineColor:'#a898c0',shape:'gas', angle:3.2277, bandColor:'#605870',
   desc:"27 moons. Strange broadcasts originate from its largest ice moon, Itze. No official will discuss this."},
  {id:'torka',    name:'Torka',    type:'Gas Giant \u00b7 Rings \u00b7 1.6 Jupiter Masses', period:18547, orbitR:492, bodyR:15, color:'#a09060',shineColor:'#c0b080',shape:'gas', angle:5.1083, bandColor:'#786840', hasRing:true,
   desc:"Ring system. Intense winds. A landmark of the deep outer system and a navigation reference in the dark."},
  {id:'kandor',   name:'Kandor',   type:'Rocky \u00b7 Outer \u2014 Meteorite-Battered', period:19386, orbitR:546, bodyR:7, color:'#907060',shineColor:'#b09080',shape:'asteroid', angle:5.2869,
   desc:"Constantly bombarded by meteorites. 4 Earth masses of rugged, crater-chewed terrain."},
  {id:'arusha',   name:'Arusha',   type:'Outer Gas Giant \u00b7 Dozens of Moons',  period:24796, orbitR:600, bodyR:13,  color:'#b07858',shineColor:'#c89878',shape:'gas',     angle:0.5909, bandColor:'#885838',
   desc:"Swirling clouds and storms. Dozens of moons. A dark anchor at the edge of the system."},
  {id:'soren',    name:'Soren',    type:'Ice \u00b7 Outer \u2014 Co-orbits with Ko', period:30692, orbitR:652, bodyR:4.5, color:'#c0d8e8',shineColor:'#ddf0f8',shape:'asteroid', angle:4.9566, isIcy:true, hasSat:true,
   desc:"Tiny. Cold. Co-orbits with the asteroid Ko at the farthest reaches of Su\u2019hur."},
];
bodies.forEach(b => b.omega = (2*Math.PI)/b.period);

const tepi = {id:'tepi',name:'Tepi',type:'Habitable Moon of Taman',moonR:28,bodyR:3.8,color:'#80c0d8',shineColor:'#a8e0f0',angle:0,omega:(2*Math.PI)/30,
  period:30, desc:"Subterranean civilization lit by bioluminescent fungi. Warm and wet beneath an icy crust."};
const ko   = {id:'ko',name:'Ko',type:'Asteroid \u2014 Co-orbits with Soren',moonR:16,bodyR:2.5,color:'#888890',shineColor:'#aaaab0',angle:Math.PI,omega:(2*Math.PI)/385,
  period:385, desc:"A similarly-sized asteroid in a binary dance with Soren at the system\u2019s farthest reaches."};
const suhurData = {name:"Su\u2019Hur",type:"K-Type Star \u00b7 Orange Dwarf",
  desc:"The warm orange heart of the system. Named for the ancient deity at the center of Ak\u2019shur religion. Source of the Cosmic Wellspring."};
const wsData = {name:"The Cosmic Wellspring",type:"Stellar Phenomenon \u00b7 Near Su\u2019Hur",
  desc:"A bolt of technicolor fabric unfurling in arching lines through space. Warm hues of redshifted lines streak from Su\u2019Hur\u2019s surface, bending back into itself, narrowing to a point where a red-hot hole bores into the dark: the ancient station. The dormant Wellspring Gate. Source of exotic matter for the Causality\u2019s FTL drive."};

// ── CAMERA ────────────────────────────────────────────────────────────
let camX,camY,camScale;
const minScale=0.18,maxScale=7;
function initCam(){
  const outerR=bodies[bodies.length-1].orbitR;
  camScale=Math.min(W,H)*0.42/outerR;
  camScale=Math.max(minScale,Math.min(maxScale*0.5,camScale));
  camX=W*0.5;camY=H*0.5;
}
function wx(x){return camX+x*camScale}
function wy(y){return camY+y*camScale}

// ── PAN / ZOOM ────────────────────────────────────────────────────────
let pan=false,psx,psy,pcx,pcy;
canvas.addEventListener('mousedown',e=>{if(e.button)return;pan=true;psx=e.clientX;psy=e.clientY;pcx=camX;pcy=camY;document.body.classList.add('panning')});
window.addEventListener('mousemove',e=>{if(!pan)return;camX=pcx+(e.clientX-psx);camY=pcy+(e.clientY-psy)});
window.addEventListener('mouseup',()=>{pan=false;document.body.classList.remove('panning')});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:1/1.1,mx=e.clientX,my=e.clientY;
  camX=mx-(mx-camX)*f;camY=my-(my-camY)*f;
  camScale=Math.max(minScale,Math.min(maxScale,camScale*f));
  updateScaleBar();
},{passive:false});
let tch=[],pd=null,ps0,tcx0,tcy0;
canvas.addEventListener('touchstart',e=>{e.preventDefault();tch=Array.from(e.touches);if(tch.length===1){psx=tch[0].clientX;psy=tch[0].clientY;pcx=camX;pcy=camY}if(tch.length===2){pd=Math.hypot(tch[1].clientX-tch[0].clientX,tch[1].clientY-tch[0].clientY);ps0=camScale;tcx0=camX;tcy0=camY}},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const ts=Array.from(e.touches);if(ts.length===1){camX=pcx+(ts[0].clientX-psx);camY=pcy+(ts[0].clientY-psy)}if(ts.length===2&&pd){const d=Math.hypot(ts[1].clientX-ts[0].clientX,ts[1].clientY-ts[0].clientY),f=d/pd;camScale=Math.max(minScale,Math.min(maxScale,ps0*f));const mx=(ts[0].clientX+ts[1].clientX)/2,my=(ts[0].clientY+ts[1].clientY)/2;camX=mx-(mx-tcx0)*f;camY=my-(my-tcy0)*f;updateScaleBar()}},{passive:false});
canvas.addEventListener('touchend',e=>{tch=Array.from(e.touches);if(tch.length<2)pd=null;if(tch.length===1){psx=tch[0].clientX;psy=tch[0].clientY;pcx=camX;pcy=camY}});

// ── STARS ─────────────────────────────────────────────────────────────
const stars=[];
for(let i=0;i<420;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.2+0.2,a:Math.random()*0.5+0.2,tw:Math.random()*Math.PI*2,warm:Math.random()<0.12});
function drawStars(t){for(const s of stars){const a=s.a*(0.7+0.3*Math.sin(t*.0008+s.tw));ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=s.warm?`rgba(255,220,160,${a})`:`rgba(200,210,255,${a})`;ctx.fill()}}

// ── WELLSPRING ────────────────────────────────────────────────────────
function drawWellspring(){
  const ox=wx(0),oy=wy(0),s=camScale;
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  const arms=[
    {pts:[[8,-8],[20,-40],[55,-55],[70,-35],[85,-15],[65,10],[80,25]],cs:[[255,180,50],[255,120,20],[200,60,5]],ws:[14,10,7],ops:[.52,.32,.18]},
    {pts:[[6,-10],[18,-45],[60,-60],[78,-38],[92,-18],[70,12],[88,28]],cs:[[255,190,60],[255,130,30],[210,70,10]],ws:[10,7,5],ops:[.32,.2,.12]},
    {pts:[[10,-6],[22,-36],[50,-50],[64,-32],[78,-12],[62,8],[74,22]],cs:[[255,170,40],[255,110,15],[190,50,0]],ws:[8,5,3],ops:[.22,.14,.08]},
  ];
  for(const arm of arms){
    const [p0x,p0y]=arm.pts[0],[c1x,c1y]=arm.pts[1],[c2x,c2y]=arm.pts[2],[p1x,p1y]=arm.pts[3],[c3x,c3y]=arm.pts[4],[c4x,c4y]=arm.pts[5],[p2x,p2y]=arm.pts[6];
    for(let p=0;p<3;p++){
      const [r,g,b]=arm.cs[p],op=arm.ops[p],w=arm.ws[p]*Math.max(.5,s);
      ctx.beginPath();ctx.moveTo(ox+p0x*s,oy+p0y*s);ctx.bezierCurveTo(ox+c1x*s,oy+c1y*s,ox+c2x*s,oy+c2y*s,ox+p1x*s,oy+p1y*s);ctx.bezierCurveTo(ox+c3x*s,oy+c3y*s,ox+c4x*s,oy+c4y*s,ox+p2x*s,oy+p2y*s);
      const g2=ctx.createLinearGradient(ox+p0x*s,oy+p0y*s,ox+p2x*s,oy+p2y*s);
      g2.addColorStop(0,`rgba(${r},${g},${b},${op*1.4})`);g2.addColorStop(.4,`rgba(${r},${g},${b},${op})`);g2.addColorStop(.75,`rgba(${r},${g},${b},${op*.5})`);g2.addColorStop(1,`rgba(${r},${g},${b},0)`);
      ctx.strokeStyle=g2;ctx.lineWidth=w;ctx.stroke();
    }
  }
  ctx.beginPath();ctx.moveTo(ox+5*s,oy-6*s);ctx.bezierCurveTo(ox+15*s,oy-30*s,ox+40*s,oy-42*s,ox+55*s,oy-28*s);ctx.bezierCurveTo(ox+68*s,oy-15*s,ox+50*s,oy+5*s,ox+62*s,oy+18*s);
  const cg=ctx.createLinearGradient(ox+5*s,oy-6*s,ox+62*s,oy+18*s);cg.addColorStop(0,'rgba(255,240,160,.92)');cg.addColorStop(.45,'rgba(255,210,100,.7)');cg.addColorStop(.8,'rgba(255,180,60,.3)');cg.addColorStop(1,'rgba(255,160,40,0)');
  ctx.strokeStyle=cg;ctx.lineWidth=Math.max(1,2.5*s);ctx.stroke();
  ctx.font=`400 ${Math.max(7,Math.min(10,9*s))}px 'Cinzel',serif`;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillStyle=`rgba(255,200,80,${Math.min(.65,.38+camScale*.35)})`;ctx.fillText('COSMIC WELLSPRING',ox+68*s,oy-52*s);
  ctx.restore();
}

// ── SUN ───────────────────────────────────────────────────────────────
function drawSun(){
  const sx=wx(0),sy=wy(0);
  for(let i=4;i>=1;i--){const g=ctx.createRadialGradient(sx,sy,0,sx,sy,STAR_R*camScale*i*1.8);g.addColorStop(0,`rgba(250,180,60,${.07/i})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.beginPath();ctx.arc(sx,sy,STAR_R*camScale*i*1.8,0,Math.PI*2);ctx.fillStyle=g;ctx.fill()}
  const gr=ctx.createRadialGradient(sx-STAR_R*camScale*.3,sy-STAR_R*camScale*.3,0,sx,sy,STAR_R*camScale*1.1);gr.addColorStop(0,'#fff8e0');gr.addColorStop(.3,'#f5c060');gr.addColorStop(.7,'#e08030');gr.addColorStop(1,'#b05010');ctx.beginPath();ctx.arc(sx,sy,STAR_R*camScale,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
}

// ── ORBITS ────────────────────────────────────────────────────────────
function drawOrbits(){
  const cx=wx(0),cy=wy(0);
  bodies.forEach((b,i)=>{ctx.beginPath();ctx.arc(cx,cy,b.orbitR*camScale,0,Math.PI*2);if(i>=9){ctx.setLineDash([4*camScale,6*camScale]);ctx.strokeStyle='rgba(255,255,255,.055)'}else{ctx.setLineDash([]);ctx.strokeStyle='rgba(255,255,255,.12)'}ctx.lineWidth=.8;ctx.stroke()});
  ctx.setLineDash([]);
}

// ── PLANET ICONS ──────────────────────────────────────────────────────
const iconSz={ravi:4,uzara:5,samaq:5.5,itzalche:6,taman:13,agni:5.5,kivuli:6,ashwin:5.5,marut:5.5,kusari:14,torka:13,kandor:7,arusha:12,soren:4.5};
function drawIcon(sx,sy,body,r){
  ctx.save();ctx.translate(sx,sy);
  if(body.shape==='gas'){
    const g=ctx.createRadialGradient(-r*.3,-r*.3,0,0,0,r*1.1);g.addColorStop(0,body.shineColor);g.addColorStop(.45,body.color);g.addColorStop(1,'rgba(0,0,0,.6)');ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.save();ctx.clip();if(body.bandColor){for(let b=-2;b<=2;b++){ctx.fillStyle=body.bandColor+'88';ctx.fillRect(-r,b*r*.38-r*.06,r*2,r*.12)}}ctx.restore();
    if(body.hasRing){ctx.save();ctx.scale(1,.28);ctx.beginPath();ctx.arc(0,0,r*1.7,0,Math.PI*2);ctx.strokeStyle=body.shineColor+'aa';ctx.lineWidth=r*.22;ctx.stroke();ctx.restore()}
  }else if(body.shape==='asteroid'){
    const pts=body.isIcy?7:6;ctx.beginPath();for(let i=0;i<pts;i++){const a=(i/pts)*Math.PI*2+(body.id==='kandor'?.5:.2),rr=r*(.7+.3*((i*3+(body.id||'x').charCodeAt(0))%7)/7);if(i===0)ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);else ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr)}ctx.closePath();
    const g=ctx.createRadialGradient(-r*.2,-r*.2,0,0,0,r);g.addColorStop(0,body.shineColor);g.addColorStop(1,body.color);ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=.5;ctx.stroke();
  }else{
    const g=ctx.createRadialGradient(-r*.35,-r*.35,0,0,0,r*1.1);g.addColorStop(0,body.shineColor);g.addColorStop(.5,body.color);g.addColorStop(1,'rgba(0,0,0,.55)');ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    if(body.hasRing){ctx.save();ctx.scale(1,.22);ctx.beginPath();ctx.arc(0,0,r*1.85,0,Math.PI*2);ctx.strokeStyle='rgba(180,160,100,.45)';ctx.lineWidth=r*.38;ctx.stroke();ctx.restore()}
  }
  ctx.restore();
}
function drawLabel(sx,sy,name,r){ctx.font="400 9px 'Cinzel',serif";ctx.textAlign='center';ctx.textBaseline='top';ctx.fillStyle='rgba(200,180,140,.7)';ctx.fillText(name,sx,sy+r+4)}

// ── POPUP ─────────────────────────────────────────────────────────────
const popup=document.getElementById('popup');
const pName=document.getElementById('popup-name'),pType=document.getElementById('popup-type'),pDesc=document.getElementById('popup-desc'),pPer=document.getElementById('popup-period'),pClose=document.getElementById('popup-close');
let popOpen=false,justOpen=false;
function openPopup(name,type,desc,period,sx,sy){
  pName.textContent=name;pType.textContent=type;pDesc.textContent=desc;
  pPer.textContent=period?(()=>{const iy=(period/ITZALCHE_DAYS*EARTH_YR_DAYS).toFixed(2);return`Period: ${period} days (${iy} PE years)`})():'';
  popup.classList.add('open');popOpen=true;justOpen=true;
  requestAnimationFrame(()=>{
    const pw=popup.offsetWidth||240,ph=popup.offsetHeight||130;
    let x=sx+18,y=sy-ph/2;if(x+pw>W-12)x=sx-pw-18;if(y<10)y=10;if(y+ph>H-10)y=H-ph-10;
    popup.style.left=x+'px';popup.style.top=y+'px';
    setTimeout(()=>{justOpen=false},0);
  });
}
function closePopup(){popup.classList.remove('open');popOpen=false;justOpen=false}
pClose.addEventListener('click',e=>{e.stopPropagation();closePopup()});
popup.addEventListener('click',e=>e.stopPropagation());
document.addEventListener('click',()=>{if(!justOpen&&popOpen)closePopup()});

// ── HIT TESTING ───────────────────────────────────────────────────────
let screenPos=[];
canvas.addEventListener('click',e=>{
  if(pan||justOpen)return;
  const r=canvas.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
  let hit=null,best=Infinity;
  for(const sp of screenPos){const d=Math.hypot(cx-sp.sx,cy-sp.sy),hr=Math.max(sp.r+4,12);if(d<hr&&d<best){best=d;hit=sp}}
  if(hit)openPopup(hit.b.name,hit.b.type,hit.b.desc,hit.b.period||null,hit.sx,hit.sy);
  else closePopup();
});

// ── TIMELINE ──────────────────────────────────────────────────────────
let simDay=50,playing=false,speed=0;  // start mid-orbit so inner planets aren't stacked
const scrub    = document.getElementById('tl-scrubber');
const btnPlay  = document.getElementById('btn-play');
const speedSel = document.getElementById('speed-select');

function setSpeed(s){
  speed=s; playing=s>0;
  btnPlay.innerHTML = playing ? '&#x23F8;' : '&#x25B6;';
  btnPlay.classList.toggle('active', playing);
  // Sync dropdown to match (find closest option)
  let best=null, bestDiff=Infinity;
  for(const opt of speedSel.options){
    const v=parseFloat(opt.value), d=Math.abs(v-s);
    if(d<bestDiff){bestDiff=d;best=opt}
  }
  if(best) speedSel.value=best.value;
}
setSpeed(0);

document.getElementById('btn-rew').addEventListener('click',()=>{simDay=0;setSpeed(0);updateScrubber()});
btnPlay.addEventListener('click',()=>setSpeed(playing?0:parseFloat(speedSel.value)||290));

// Speed dropdown
speedSel.addEventListener('change',()=>{
  const v=parseFloat(speedSel.value);
  if(v===0){ setSpeed(0); }
  else { speed=v; playing=true; btnPlay.innerHTML='&#x23F8;'; btnPlay.classList.add('active'); }
});

scrub.addEventListener('input',()=>{simDay=parseFloat(scrub.value);updateScrubber()});
scrub.addEventListener('mousedown',()=>{if(playing){setSpeed(0)}});

function updateScrubber(){scrub.value=String(simDay);updateYearDisplay(simDay)}

// ── GO TO YEAR ────────────────────────────────────────────────────────
// Accepts:  CE 9600  |  PC 3000  |  PE 4409  |  bare number (treated as CE)
function parseGotoInput(raw){
  const s = raw.trim().toUpperCase().replace(/,/g,'');
  const numPart = parseFloat(s.replace(/^(CE|PC|PE)\s*/,''));
  if(isNaN(numPart)) return null;

  let targetCE;
  if(s.startsWith('PE')){
    // PE → CE: KAEL_BORN_CE + (pe-1)/PE_PER_EARTH
    targetCE = KAEL_BORN_CE + (numPart - 1) / PE_PER_EARTH;
  } else if(s.startsWith('PC')){
    // PC → CE: CE_COLLAPSE + pc
    targetCE = CE_COLLAPSE + numPart;
  } else {
    // CE or bare number
    targetCE = numPart;
  }
  const sd = (targetCE - START_CE) * EARTH_YR_DAYS;
  return Math.max(0, Math.min(MAX_SIM_DAYS, Math.round(sd)));
}

document.getElementById('goto-btn').addEventListener('click', doGoto);
document.getElementById('goto-input').addEventListener('keydown', e=>{if(e.key==='Enter')doGoto()});

function doGoto(){
  const inp = document.getElementById('goto-input');
  const sd = parseGotoInput(inp.value);
  if(sd===null){ inp.style.borderColor='rgba(220,80,60,.7)'; setTimeout(()=>inp.style.borderColor='',1000); return; }
  simDay=sd; setSpeed(0); updateScrubber();
  inp.value=''; inp.style.borderColor='';
}

// Calendar mode toggle
document.querySelectorAll('.cal-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    calMode=btn.dataset.mode;
    document.querySelectorAll('.cal-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    updateYearDisplay(simDay);
  });
});

// Epoch jump buttons
const EPOCHS=[
  {label:'3700 CE',        day:0},
  {label:'PC 0',           day:Math.max(0,Math.round((CE_COLLAPSE-START_CE)*EARTH_YR_DAYS))},
  {label:'PE 1 — Kael',    day:KAEL_SIM_DAY},
  {label:'The Gathering',  day:Math.round((9600-START_CE)*EARTH_YR_DAYS)},
  {label:'PE 4535',        day:MAX_SIM_DAYS},
];
const epCon=document.getElementById('epoch-btns');
EPOCHS.forEach(ep=>{
  const b=document.createElement('button');b.className='ep-btn';b.textContent=ep.label;
  b.addEventListener('click',()=>{simDay=Math.max(0,ep.day);setSpeed(0,'PAUSED');updateScrubber()});
  epCon.appendChild(b);
});

// ── SCALE BAR ─────────────────────────────────────────────────────────
function updateScaleBar(){const au=(100/camScale/174).toFixed(2);document.getElementById('hud-scale-label').textContent=`~${au} AU`}

// ── LEGEND TOGGLE ─────────────────────────────────────────────────────
document.getElementById('leg-toggle').addEventListener('click',()=>document.getElementById('hud-legend').classList.toggle('open'));

// ── MAIN DRAW LOOP ────────────────────────────────────────────────────
let lastT=null;
function draw(t){
  if(lastT!==null&&playing&&speed>0){
    simDay+=speed*((t-lastT)/1000);
    if(simDay>MAX_SIM_DAYS)simDay=MAX_SIM_DAYS;
    updateScrubber();
  }
  lastT=t;

  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0a0c12';ctx.fillRect(0,0,W,H);
  drawStars(t);drawWellspring();drawOrbits();drawSun();

  screenPos=[];
  // Wellspring hit
  screenPos.push({sx:wx(0)+55*camScale,sy:wy(0)-38*camScale,r:20,b:{...wsData,period:null}});
  // Su'hur hit
  screenPos.push({sx:wx(0),sy:wy(0),r:STAR_R,b:{...suhurData,period:null}});

  bodies.forEach(b=>{
    const ang=b.angle+b.omega*simDay;
    const bx=Math.cos(ang)*b.orbitR,by=Math.sin(ang)*b.orbitR;
    const sx=wx(bx),sy=wy(by),r=iconSz[b.id]||6;
    drawIcon(sx,sy,b,r);drawLabel(sx,sy,b.name,r);
    screenPos.push({sx,sy,r,b});

    if(b.hasMoon){
      const mA=tepi.angle+tepi.omega*simDay,msx=sx+Math.cos(mA)*tepi.moonR,msy=sy+Math.sin(mA)*tepi.moonR;
      ctx.beginPath();ctx.arc(sx,sy,tepi.moonR,0,Math.PI*2);ctx.setLineDash([2,3]);ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=.6;ctx.stroke();ctx.setLineDash([]);
      const mb={id:'tepi',name:'Tepi',type:tepi.type,color:tepi.color,shineColor:tepi.shineColor,shape:'rocky',desc:tepi.desc,period:tepi.period};
      drawIcon(msx,msy,mb,3.8);drawLabel(msx,msy,'Tepi',3.8);screenPos.push({sx:msx,sy:msy,r:3.8,b:mb});
    }
    if(b.hasSat){
      const kA=ko.angle+ko.omega*simDay,ksx=sx+Math.cos(kA)*ko.moonR,ksy=sy+Math.sin(kA)*ko.moonR;
      ctx.beginPath();ctx.arc(sx,sy,ko.moonR,0,Math.PI*2);ctx.setLineDash([1.5,3]);ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=.5;ctx.stroke();ctx.setLineDash([]);
      const kb={id:'ko',name:'Ko',type:ko.type,color:ko.color,shineColor:ko.shineColor,shape:'asteroid',desc:ko.desc,period:ko.period};
      drawIcon(ksx,ksy,kb,2.5);drawLabel(ksx,ksy,'Ko',2.5);screenPos.push({sx:ksx,sy:ksy,r:2.5,b:kb});
    }
  });

  updateScaleBar();
  requestAnimationFrame(draw);
}

// ── INIT ──────────────────────────────────────────────────────────────
initCam();updateYearDisplay(simDay);
requestAnimationFrame(draw);

})();
</script>
